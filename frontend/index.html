<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>진헬스 일일매출보고</title>
<style>
  :root { --line:#e7e7ea; --muted:#8e8e93; --text:#1c1c1e; --resv:#0369a1; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,'Malgun Gothic',sans-serif; max-width:460px; margin:0 auto;
         padding:16px 14px 40px; color:var(--text); background:#fff; }
  h1 { font-size:18px; margin:6px 0 2px; }
  .sub { font-size:12px; color:var(--muted); margin-bottom:16px; }
  .sec { font-size:12px; color:var(--muted); font-weight:600; margin:18px 2px 8px; }
  .card { border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:6px; }
  table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
  th,td { padding:10px 12px; text-align:right; font-size:13px; }
  th:first-child, td:first-child { text-align:left; }
  thead th { font-size:11px; font-weight:500; color:var(--muted); background:#fafafa; border-bottom:1px solid var(--line); }
  tbody td { border-bottom:1px solid #f2f2f4; }
  tbody tr:last-child td { border-bottom:none; }
  .num-amt { font-size:12px; }
  .zero { color:#c7c7cc; }
  tr.total td { background:#fafafa; font-weight:700; border-top:1px solid var(--line); }
  .proj { background:#1c1c1e; color:#fff; border-radius:14px; padding:16px 18px; margin-bottom:6px; }
  .proj .k { font-size:12px; color:#b9b9be; }
  .proj .v { font-size:26px; font-weight:700; margin-top:4px; letter-spacing:-.5px; }
  .proj .u { font-size:12px; color:#b9b9be; margin-top:2px; }
  .line { display:flex; justify-content:space-between; padding:11px 14px; border:1px solid var(--line);
          border-radius:12px; margin-bottom:8px; font-size:14px; }
  .line .lb { color:var(--muted); font-size:12px; }
  .line b { font-weight:700; }
  .bars { display:flex; align-items:flex-end; gap:6px; height:140px; padding:8px 12px 4px;
          border:1px solid var(--line); border-radius:14px; }
  .bcol { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; }
  .bval { font-size:10px; color:var(--muted); margin-bottom:4px; white-space:nowrap; }
  .btrack { flex:1; width:100%; display:flex; align-items:flex-end; }
  .bfill { width:100%; background:var(--resv); border-radius:4px 4px 0 0; min-height:2px; }
  .bcol.today .bfill { background:#1c1c1e; }
  .bx { font-size:10px; color:var(--muted); margin-top:5px; text-align:center; line-height:1.3; }
  .bcol.today .bx { color:var(--text); font-weight:600; }
  .status { font-size:13px; color:var(--muted); margin-top:40px; text-align:center; }
</style>
</head>
<body>
  <h1 id="title">일일매출보고</h1>
  <div class="sub" id="meta"></div>
  <div id="content" style="display:none"></div>
  <div class="status" id="status">불러오는 중...</div>

<script>
const won = n => (n || 0).toLocaleString('ko-KR');
const cell = v => v ? won(v) : '<span class="zero">0</span>';

function groupTable(rep, countLabel) {
  const rows = (rep.groups || []).map(g => `
    <tr><td>${g.category}</td><td>${cell(g.cnt)}</td>
        <td class="num-amt">${cell(g.amt)}</td><td class="num-amt">${cell(g.avg)}</td></tr>`).join('');
  const t = rep.total || { cnt: 0, amt: 0, avg: 0 };
  return `<div class="card"><table>
    <thead><tr><th>구분</th><th>${countLabel || '명수'}</th><th>금액</th><th>평균단가</th></tr></thead>
    <tbody>${rows}
      <tr class="total"><td>합계</td><td>${won(t.cnt)}</td>
      <td class="num-amt">${won(t.amt)}</td><td class="num-amt">${won(t.avg)}</td></tr>
    </tbody></table></div>`;
}

function bars(items) {
  if (!items || !items.length) return '';
  const max = Math.max(1, ...items.map(it => it.amt));
  const man = n => n >= 10000 ? Math.round(n / 10000).toLocaleString('ko-KR') + '만' : (n ? won(n) : '0');
  const cols = items.map((it, i) => {
    const h = Math.round(it.amt / max * 100);
    const today = i === items.length - 1;
    return `<div class="bcol ${today ? 'today' : ''}">
      <div class="bval">${man(it.amt)}</div>
      <div class="btrack"><div class="bfill" style="height:${h}%"></div></div>
      <div class="bx">${it.date}<br>(${it.weekday})</div></div>`;
  }).join('');
  return `<div class="bars">${cols}</div>`;
}

function renderNew(r, receivedAt) {
  const p = (r.report_date || '').split('-');
  document.getElementById('title').textContent =
    (p.length === 3 ? `${p[1]}월${p[2]}일 ` : '') + '진헬스 일일매출보고';
  document.getElementById('meta').textContent =
    `생성 ${r.generated_at || ''}${receivedAt ? ' · 수신 ' + receivedAt.slice(0, 16).replace('T', ' ') : ''}`;

  const m = r.monthly || {}, nx = r.next_month || {};
  const pj = m.projected || { cnt: 0, amt: 0 };
  const sTot = (m.sales && m.sales.total) || m.sales_total || {};
  const uTot = (m.upcoming && m.upcoming.total) || m.upcoming_total || {};
  let html = '';
  html += `<div class="sec">금일 수검인원</div>${groupTable(r.today || {})}`;
  html += `<div class="sec">월간 현황 · ${m.month || ''}</div>`;
  html += `<div class="proj"><div class="k">예상 매출 · 이번달 매출 + 남은 예약</div>
    <div class="v">${won(pj.amt)}원</div>
    <div class="u">${won(pj.cnt)}명 (매출 ${won(sTot.cnt)} + 예약 ${won(uTot.cnt)})</div></div>`;
  if (m.sales && m.sales.groups) {
    html += `<div class="sec">이번달 매출 · ${m.sales_period || ''}</div>${groupTable(m.sales)}`;
  } else {
    html += `<div class="line"><span class="lb">이번달 매출 ${m.sales_period || ''}</span>
      <span><b>${won(sTot.amt)}</b>원 · ${won(sTot.cnt)}명</span></div>`;
  }
  if (m.upcoming && m.upcoming.groups) {
    html += `<div class="sec">남은 예약 · ${m.upcoming_period || ''}</div>${groupTable(m.upcoming)}`;
  } else {
    html += `<div class="line"><span class="lb">남은 예약 ${m.upcoming_period || ''}</span>
      <span><b>${won(uTot.amt)}</b>원 · ${won(uTot.cnt)}명</span></div>`;
  }
  html += `<div class="sec">익월 예약 · ${nx.month || ''} ${nx.period || ''}</div>`;
  if (nx.reservation && nx.reservation.groups) {
    html += groupTable(nx.reservation);
  } else {
    html += `<div class="line"><span class="lb">예약 합계</span>
      <span><b>${won((nx.total || {}).amt)}</b>원 · ${won((nx.total || {}).cnt)}명</span></div>`;
  }
  if (r.daily_res && r.daily_res.length) {
    html += `<div class="sec">1일 예약금액 · 최근 7일</div>${bars(r.daily_res)}`;
  }
  document.getElementById('content').innerHTML = html;
}

// 구 형식(월별 cnt/amt 12칸) 폴백 — 새 데이터 push 전 호환
function renderLegacy(r, receivedAt) {
  document.getElementById('title').textContent = `일일보고 ${r.report_date || ''}`;
  document.getElementById('meta').textContent =
    `${r.year || ''}년 월별 집계${receivedAt ? ' · ' + receivedAt.slice(0, 16).replace('T', ' ') : ''}`;
  const cnt = r.cnt || [], amt = r.amt || [];
  let sumC = 0, sumA = 0, rows = '';
  for (let i = 0; i < 12; i++) {
    const c = cnt[i] || 0, a = amt[i] || 0; sumC += c; sumA += a;
    if (!c && !a) continue;
    rows += `<tr><td>${i + 1}월</td><td>${won(c)}</td><td class="num-amt">${won(a)}</td></tr>`;
  }
  document.getElementById('content').innerHTML = `<div class="card"><table>
    <thead><tr><th>월</th><th>건수</th><th>금액</th></tr></thead>
    <tbody>${rows}<tr class="total"><td>합계</td><td>${won(sumC)}</td>
    <td class="num-amt">${won(sumA)}</td></tr></tbody></table></div>
    ${r.memo ? `<div class="sec">메모</div><div class="line">${r.memo}</div>` : ''}`;
}

(async function () {
  const q = new URLSearchParams(location.search);
  const k = q.get('k') || '', date = q.get('date');
  const url = date ? `/api/reports/${date}?k=${encodeURIComponent(k)}`
                   : `/api/reports/latest?k=${encodeURIComponent(k)}`;
  const statusEl = document.getElementById('status');
  try {
    const resp = await fetch(url);
    if (resp.status === 403) { statusEl.textContent = '접근 권한이 없습니다.'; return; }
    const data = await resp.json();
    if (!data.success) { statusEl.textContent = data.error || '조회 실패'; return; }
    (data.report.today ? renderNew : renderLegacy)(data.report, data.received_at);
    document.getElementById('content').style.display = 'block';
    statusEl.textContent = '';
  } catch (e) {
    statusEl.textContent = '서버에 연결할 수 없습니다.';
  }
})();
</script>
</body>
</html>
